name: Swift
on: [push]
jobs:

  macos:
    name: macOS
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        config: ["debug", "release"]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }}

  linux:
    name: Linux (${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ["swift:latest", "swiftlang/swift:nightly-noble"]
        config: ["debug", "release"]
    container: ${{ matrix.container }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }}
